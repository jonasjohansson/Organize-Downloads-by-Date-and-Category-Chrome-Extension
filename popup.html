<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 280px; padding: 16px; font-family: system-ui, sans-serif; font-size: 13px; color: #333; }
  h1 { font-size: 14px; margin-bottom: 8px; }
  p { color: #666; line-height: 1.4; }
  .example { margin-top: 10px; padding: 8px; background: #f5f5f5; border-radius: 4px; font-family: monospace; font-size: 12px; }
</style>
</head>
<body>
  <h1>Organize Downloads by Extension</h1>
  <p>Downloads are automatically sorted into folders by year and file extension.</p>
  <div class="example">photo.jpg &rarr; 2026/jpg/photo.jpg<br>song.mp3 &rarr; 2026/mp3/song.mp3<br>doc.pdf &rarr; 2026/pdf/doc.pdf</div>
</body>
</html>
